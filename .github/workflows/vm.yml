name: Biersack VM V8

on:
  workflow_dispatch:

jobs:
  vm:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Set up job
        run: echo "Iniciando configuração"

      - name: Iniciando VM
        run: |
          sudo apt update

      - name: Instalando desktop remoto
        run: |
          sudo apt install -y xfce4 xfce4-goodies xrdp wget curl

          sudo useradd -m -s /bin/bash runner || true
          echo "runner:123456" | sudo chpasswd
          sudo usermod -aG sudo runner

          echo "xfce4-session" > /home/runner/.xsession
          sudo chown runner:runner /home/runner/.xsession

          sudo systemctl enable xrdp
          sudo systemctl restart xrdp

      - name: Mostrar acesso remoto
        run: |
          echo "======================================"
          echo "🖥️ BIERSACK VM - REMOTE DESKTOP"
          echo "======================================"
          echo ""
          echo "Usuário: runner"
          echo "Senha: 123456"
          echo "RDP: porta 3389"
          echo ""
          echo "IP DA VM:"
          curl ifconfig.me
          echo ""
          echo "======================================"

      - name: Manter VM ligada
        run: |
          echo "VM ativa por até 6 horas"
          while true; do
            echo "VM online..."
            sleep 300
          done
