name: Biersack VM V2

on:
  workflow_dispatch:

jobs:
  vm:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Iniciando VM
        run: |
          echo "======================================"
          echo "🚀 Biersack VM V2 iniciada"
          echo "======================================"
          echo ""
          echo "🖥️ SISTEMA:"
          uname -a
          echo ""
          echo "⚙️ CPU:"
          lscpu
          echo ""
          echo "🧠 MEMÓRIA RAM:"
          free -h
          echo ""
          echo "💾 DISCO:"
          df -h
          echo ""
          echo "✅ VM iniciada com sucesso"

      - name: Instalando acesso remoto
        run: |
          sudo apt update
          sudo apt install -y tmate

      - name: Criar terminal remoto
        run: |
          echo ""
          echo "======================================"
          echo "🌐 Biersack VM - TERMINAL REMOTO"
          echo "======================================"
          echo ""
          echo "⏳ Gerando acesso remoto..."
          echo ""

          tmate -S /tmp/tmate.sock new-session -d
          sleep 15

          echo "======================================"
          echo "🔑 COPIE O SSH ABAIXO PARA O TERMIUS"
          echo "======================================"

          tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'

          echo ""
          echo "🌍 ACESSO PELO NAVEGADOR:"
          tmate -S /tmp/tmate.sock display -p '#{tmate_web}'

          echo ""
          echo "🕒 TEMPO DA VM: 4 HORAS"
          echo "⚡ STATUS: ONLINE"
          echo ""

          for i in $(seq 1 240); do
            echo "⏱️ VM ONLINE - $i minuto(s)"
            sleep 60
          done

          echo ""
          echo "🔴 Biersack VM encerrada"
