name: Biersack VM V8

on:
  workflow_dispatch:

jobs:
  vm:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Iniciando VM
        run: |
          echo "🚀 Biersack VM V8 iniciada"
          uname -a
          free -h
          df -h

      - name: Instalando desktop remoto
        run: |
          sudo apt update
          sudo apt install -y xfce4 xfce4-goodies xrdp curl
          sudo useradd -m runner || true
          echo "runner:123456" | sudo chpasswd
          echo "xfce4-session" > /home/runner/.xsession
          sudo chown runner:runner /home/runner/.xsession
          sudo systemctl enable xrdp
          sudo systemctl restart xrdp

      - name: Mostrar acesso remoto
        run: |
          echo "====================================="
          echo "🖥️ BIERSACK VM V8"
          echo "====================================="
          echo "Usuário: runner"
          echo "Senha: 123456"
          echo "RDP: porta 3389"
          echo ""
          echo "IP DA VM:"
          curl -s ifconfig.me
          echo ""
          echo "VM online por 4 horas"

      - name: Manter VM ligada
        run: |
          sleep 14400
